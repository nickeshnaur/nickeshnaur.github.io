<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nick Eshnaur Design</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Roboto', sans-serif;
    background: #fff;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Aurora ── */
  .aurora {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
    filter: blur(80px) saturate(1.8);
    opacity: .5;
  }

  .aurora span {
    position: absolute;
    border-radius: 50%;
  }

  .aurora .a1 {
    width: 55vmax; height: 55vmax;
    background: radial-gradient(circle, #a78bfa 0%, transparent 70%);
    top: -20%; left: -15%;
    animation: drift1 3.5s ease-in-out infinite alternate;
  }
  .aurora .a2 {
    width: 45vmax; height: 45vmax;
    background: radial-gradient(circle, #f9a8d4 0%, transparent 70%);
    bottom: -25%; right: -10%;
    animation: drift2 4s ease-in-out infinite alternate;
  }
  .aurora .a3 {
    width: 40vmax; height: 40vmax;
    background: radial-gradient(circle, #67e8f9 0%, transparent 70%);
    top: 40%; left: 55%;
    animation: drift3 3s ease-in-out infinite alternate;
  }
  .aurora .a4 {
    width: 35vmax; height: 35vmax;
    background: radial-gradient(circle, #fdba74 0%, transparent 70%);
    top: 60%; left: 10%;
    animation: drift4 4.5s ease-in-out infinite alternate;
  }

  @keyframes drift1 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg) }
    100% { transform: translate(60vw, 50vh) scale(1.4) rotate(60deg) }
  }
  @keyframes drift2 {
    0%   { transform: translate(0, 0) scale(1.1) rotate(0deg) }
    100% { transform: translate(-55vw, -55vh) scale(.7) rotate(-50deg) }
  }
  @keyframes drift3 {
    0%   { transform: translate(0, 0) scale(.9) rotate(0deg) }
    100% { transform: translate(-65vw, 40vh) scale(1.3) rotate(70deg) }
  }
  @keyframes drift4 {
    0%   { transform: translate(0, 0) scale(1) rotate(0deg) }
    100% { transform: translate(50vw, -55vh) scale(1.5) rotate(-60deg) }
  }

  /* ── Grain ── */
  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: .025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 180px;
  }

  /* ── Full-page input ── */
  .page-input {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 40px;
    animation: fadeUp .9s cubic-bezier(.16,1,.3,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px) }
    to   { opacity: 1; transform: translateY(0) }
  }

  .page-input .display {
    font-family: 'Climate Crisis', system-ui;
    font-weight: 400;
    font-size: 25vw;
    letter-spacing: 0;
    text-align: center;
    width: 90vw;
    color: #fff;
    white-space: nowrap;
    user-select: none;
    cursor: text;
    line-height: 1.1;
  }
  .page-input .display.placeholder {
    color: rgba(255,255,255,.35);
  }
  .page-input .display.typing {
    font-family: sans-serif;
    font-size: 2rem !important;
    letter-spacing: .3em;
  }
  /* Hidden input to capture keystrokes */
  .page-input .hidden-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0;
    height: 0;
  }

  /* ── Arrow button — bottom right ── */
  .btn {
    position: fixed;
    bottom: 36px;
    right: 36px;
    z-index: 20;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: rgba(0,0,0,.18);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color .25s, transform .15s, background .25s;
  }
  .btn:hover {
    background: rgba(255,255,255,.7);
    color: rgba(0,0,0,.35);
  }
  .btn:active { transform: scale(.9) }
  .btn .material-icons { font-size: 20px; }

  /* ── Error hint — bottom center ── */
  .hint {
    position: fixed;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: .75rem;
    font-weight: 400;
    color: #ef4444;
    letter-spacing: .04em;
    opacity: 0;
    transition: opacity .35s;
  }
  .hint.visible { opacity: 1 }

  /* ── Shake ── */
  @keyframes shake {
    0%,100% { transform: translateX(0) }
    20%     { transform: translateX(-10px) }
    40%     { transform: translateX(8px) }
    60%     { transform: translateX(-6px) }
    80%     { transform: translateX(4px) }
  }
  .page-input.shake { animation: shake .4s ease }

  /* ── Unlock ── */
  .unlock-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity .6s ease;
  }
  .unlock-overlay.active {
    opacity: 1;
    pointer-events: all;
  }


</style>
</head>
<body>

<div class="aurora">
  <span class="a1"></span>
  <span class="a2"></span>
  <span class="a3"></span>
  <span class="a4"></span>
</div>

<div class="grain"></div>

<div class="page-input" id="card">
  <input class="hidden-input" id="pw" type="text" autocomplete="off" spellcheck="false" autofocus>
  <div class="display placeholder" id="display">Password</div>
</div>

<button class="btn" id="submit" aria-label="Submit">
  <span class="material-icons">arrow_forward</span>
</button>

<div class="hint" id="hint">Wrong password</div>

<div class="unlock-overlay" id="unlock"></div>

<script>
  const PASSWORD = 'pizzaiseternal';
  const pw      = document.getElementById('pw');
  const display = document.getElementById('display');
  const card    = document.getElementById('card');
  const hint    = document.getElementById('hint');
  const unlock  = document.getElementById('unlock');

  function updateDisplay() {
    if (pw.value.length === 0) {
      display.textContent = 'Password';
      display.classList.add('placeholder');
      display.classList.remove('typing');
    } else {
      display.textContent = '🍕'.repeat(pw.value.length);
      display.classList.remove('placeholder');
      display.classList.add('typing');
    }
  }

  function attempt() {
    if (pw.value === PASSWORD) {
      unlock.classList.add('active');
    } else {
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      hint.classList.add('visible');
      pw.value = '';
      updateDisplay();
      pw.focus();
      setTimeout(() => hint.classList.remove('visible'), 2000);
    }
  }

  pw.addEventListener('input', updateDisplay);
  pw.addEventListener('keydown', e => { if (e.key === 'Enter') attempt() });
  document.getElementById('submit').addEventListener('click', attempt);

  // Click anywhere on the display to focus the hidden input
  display.addEventListener('click', () => pw.focus());
  document.addEventListener('click', e => {
    if (!e.target.closest('.btn')) pw.focus();
  });

</script>
</body>
</html>
